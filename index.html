<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Avatar Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --bg-dark: #04060e; --bg-card: #080c1c; --border: #1e2848; --gold-dim: #3a2e10; }
        body { background: var(--bg-dark); color: #d0d8f0; font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; text-align: center; }
        
        h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 4px; margin-bottom: 50px; text-shadow: 0 0 15px rgba(201,168,76,0.3); }

        /* LEAGUE SECTION STYLING */
        .league-section { 
            margin: 40px auto; 
            max-width: 1200px; 
            border: 2px solid var(--gold-dim); 
            border-radius: 15px; 
            padding: 30px; 
            background: rgba(8, 12, 28, 0.5);
            position: relative;
        }
        
        .league-title { 
            position: absolute; 
            top: -18px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--bg-dark); 
            padding: 0 20px; 
            font-family: 'Cinzel', serif; 
            color: var(--gold); 
            font-size: 1.5rem; 
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
        }
        
        .avatar-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 10px; 
        }
        
        .avatar-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; }
        .name { margin-top: 10px; font-size: 0.85rem; color: var(--gold); font-weight: bold; }

        #league-counter { width: auto !important; height: 32px !important; display: inline-block !important; }
    </style>
</head>
<body>

    <h1>League Avatar Vault</h1>
    <div id="main-container">Loading League Folders...</div>

    <div style="margin-top: 80px; padding-bottom: 60px; text-align: center; clear: both;">
        <img id="league-counter" src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Frainsplace.github.io%2FAvatars%2F&label=Visits&icon=cloud-drizzle&color=%23198754&style=flat">
    </div>

    <script>
        const username = 'RainsPlace';
        const repo = 'Avatars';

        async function initGallery() {
            const container = document.getElementById('main-container');
            
            try {
                // 1. Get all folders in the repo
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const items = await response.json();
                
                container.innerHTML = ''; // Clear loading message

                for (const item of items) {
                    // Only process Folders
                    if (item.type === 'dir') {
                        const section = document.createElement('div');
                        section.className = 'league-section';
                        section.innerHTML = `<div class="league-title">${item.name}</div><div class="gallery" id="gal-${item.name.replace(/\s/g, '')}"></div>`;
                        container.appendChild(section);

                        // 2. Fetch images inside each folder
                        const resImg = await fetch(item.url);
                        const files = await resImg.json();
                        const gallery = document.getElementById(`gal-${item.name.replace(/\s/g, '')}`);

                        files.forEach(file => {
                            if (file.name.match(/\.(png|jpg|jpeg|gif)$/i)) {
                                const cleanName = file.name.split('.')[0].replace(/([A-Z])/g, ' $1').trim();
                                gallery.innerHTML += `
                                    <div class="avatar-card">
                                        <img src="${file.download_url}" alt="${cleanName}">
                                        <div class="name">${cleanName}</div>
                                    </div>`;
                            }
                        });
                    }
                }
            } catch (e) { container.textContent = "Error loading folders."; }
        }

        initGallery();
    </script>
</body>
</html>
