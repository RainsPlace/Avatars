<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Avatar Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --bg-dark: #04060e; --bg-card: #080c1c; --border: #1e2848; }
        body { background: var(--bg-dark); color: #d0d8f0; font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 2px; margin-bottom: 30px; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .avatar-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            transition: transform 0.2s;
        }
        .avatar-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; background: #000; }
        
        .name { margin-top: 12px; font-size: 0.9rem; font-weight: bold; color: var(--gold); overflow: hidden; text-overflow: ellipsis; }
        
        #loading { color: var(--gold); font-style: italic; margin: 50px; }
    </style>
</head>
<body>

    <h1>League Gallery</h1>
    <div id="loading">Gathering avatars from the vault...</div>
    <div class="gallery" id="gallery"></div>

    <div style="margin-top: 50px; padding-bottom: 40px;">
        <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Frainsplace.github.io%2FAvatars%2F&label=Gallery+Visits&icon=cloud-drizzle&color=%23198754&style=flat" style="width: auto; height: auto;">
    </div>

    <script>
        // 1. SET THESE TWO LINES:
        const username = 'RainsPlace';
        const repo = 'Avatars'; // Replace with the actual name of this repository

        async function loadAvatars() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');
            
            try {
                // This asks GitHub for the list of files in the repo
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();
                
                loading.style.display = 'none';
                
                files.forEach(file => {
                    // Only show image files
                    if (file.name.match(/\.(png|jpg|jpeg|gif)$/i)) {
                        const card = document.createElement('div');
                        card.className = 'avatar-card';
                        
                        // Clean up the name for the label (remove extension and fix spacing)
                        const cleanName = file.name.split('.')[0].replace(/([A-Z])/g, ' $1').trim();
                        
                        card.innerHTML = `
                            <img src="${file.download_url}" alt="${cleanName}">
                            <div class="name">${cleanName}</div>
                        `;
                        gallery.appendChild(card);
                    }
                });
            } catch (error) {
                loading.textContent = "Failed to load avatars. Make sure the repo name is correct!";
            }
        }

        loadAvatars();
    </script>
</body>
</html>
